<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Village Premier League</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">VPL</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="teams.html">Teams</a>
            <a href="fixtures.html">Fixtures</a>
            <a href="points.html">Points Table</a>
            <a href="stats.html" class="active">Stats</a>
            <a href="admin/index.html" class="admin-link">Admin login</a>
        </nav>
    </header>

    <main>
        <h1>Tournament Statistics</h1>
        <p class="subtitle">Top performers of the Village Premier League.</p>
        
        <div class="grid grid-cols-2" id="stats-container" style="gap: 2rem;">
            <!-- Rendered beautifully via JS -->
        </div>
    </main>

    <script src="js/store.js"></script>
    <script>

        const activeYear = Store.getActiveYear();
        const teams = Store.getTeams();
        
        // 1. Flatten all active players across all teams into one super-array for analysis
        let allPlayers = [];
        teams.forEach(team => {
            const squads = team.squads || {};
            const activeSquad = squads[activeYear] || [];
            activeSquad.forEach(player => {
                // Ignore empty string placeholders 
                if(typeof player === 'object') {
                    // Inject shortName for display
                    player.teamCode = team.shortName;
                    allPlayers.push(player);
                }
            });
        });

        // 2. Define our 12 Automated Categories
        const categories = [
            { id: 'most-runs', title: 'Most Runs', field: 'runs', color: 'var(--accent-gold)', badge: 'Orange Cap' },
            { id: 'most-wkts', title: 'Most Wickets', field: 'wickets', color: '#a855f7', badge: 'Purple Cap' },
            { id: 'highest-score', title: 'Highest Score', field: 'highestScore', color: '#3b82f6', 
                customSort: (a,b) => (parseInt(b.highestScore) || 0) - (parseInt(a.highestScore) || 0) },
            { id: 'best-bowl', title: 'Best Bowling Figure', field: 'bestBowling', color: '#10b981',
                customSort: (a,b) => {
                    const parse = (s) => { const p=(s||'0/0').split('/'); return p.length===2 ? [parseInt(p[0])||0, parseInt(p[1])||0] : [0,0]; };
                    const aa = parse(a.bestBowling); const bb = parse(b.bestBowling);
                    if(aa[0] !== bb[0]) return bb[0] - aa[0]; // Wickets sort desc
                    return aa[1] - bb[1]; // Runs sort asc
                }
            },
            { id: 'most-6s', title: 'Most Sixes (Season)', field: 'totalSixes', color: '#ef4444' },
            { id: 'most-4s', title: 'Most Fours (Season)', field: 'totalFours', color: '#f59e0b' },
            { id: 'fast-50', title: 'Fastest Fifty', field: 'fastestFifty', color: '#06b6d4', asc: true, excludeZero: true, suffix: ' balls' },
            { id: 'fast-100', title: 'Fastest Hundred', field: 'fastestHundred', color: '#ec4899', asc: true, excludeZero: true, suffix: ' balls' },
            { id: 'best-avg', title: 'Best Average', field: 'average', color: '#f97316' },
            { id: 'best-econ', title: 'Best Economy', field: 'economy', color: '#84cc16', asc: true, excludeZero: true }
        ];

        // 3. Render function
        const container = document.getElementById('stats-container');
        
        container.innerHTML = categories.map(cat => {
            // Sort data logic
            let sorted = [...allPlayers];
            
            if (cat.customSort) {
                sorted = sorted.sort(cat.customSort);
            } else {
                sorted = sorted.sort((a, b) => {
                    let valA = a[cat.field] || 0;
                    let valB = b[cat.field] || 0;
                    if (cat.asc) return valA - valB;
                    return valB - valA;
                });
            }

            // Filter logic
            if (cat.excludeZero) {
                sorted = sorted.filter(p => p[cat.field] && p[cat.field] !== 0 && p[cat.field] !== "0/0" && p[cat.field] !== "0");
            } else {
                // Standard exclusion to not fill board with 0s unless absolutely necessary
                sorted = sorted.filter(p => {
                    const v = p[cat.field];
                    if(cat.field === 'highestScore' && (!v || parseInt(v) === 0)) return false;
                    if(cat.field === 'bestBowling' && (!v || v.startsWith('0/'))) return false;
                    if(v === undefined || v === null || v === 0) return false;
                    return true;
                });
            }

            const top5 = sorted.slice(0, 5);

            let tableHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding:1rem;">No data available</td></tr>';
            
            if(top5.length > 0) {
                tableHTML = top5.map((p, i) => `
                    <tr>
                        <td style="font-weight: 600; display:flex; align-items:center; gap:0.5rem;">
                            ${i === 0 ? '<span style="font-size:1.2rem;">👑</span>' : `<span style="display:inline-block; width:24px; color:var(--text-muted)">${i+1}.</span>`}
                            ${p.image ? `<img src="${p.image}" style="width:28px; height:28px; border-radius:50%; object-fit:cover; border:1px solid ${cat.color};">` : `<div style="width:28px; height:28px; border-radius:50%; background:var(--glass-border); display:flex; align-items:center; justify-content:center; font-size:0.6rem; border:1px solid ${cat.color};">👤</div>`}
                            ${p.name}
                        </td>
                        <td style="color: var(--text-muted);">${p.teamCode}</td>
                        <td style="text-align: right; font-weight: 800; color: white; font-size: 1.1rem;">
                            ${p[cat.field]}${cat.suffix || ''}
                        </td>
                    </tr>
                `).join('');
            }

            return `
                <div class="card" style="border-top: 4px solid ${cat.color}; padding: 1.5rem;">
                    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 2rem;">
                        <h2 style="margin:0; font-size: 1.2rem;">${cat.title}</h2>
                        ${cat.badge ? `<span class="badge" style="background: ${cat.color}; color: ${cat.color === 'var(--accent-gold)' ? 'var(--primary-blue)' : 'white'}">${cat.badge}</span>` : ''}
                    </div>
                    
                    <table style="margin-top: 0; width: 100%;">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Team</th>
                                <th style="text-align: right;">Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableHTML}
                        </tbody>
                    </table>
                </div>
            `;
        }).join('');

    </script>
</body>
</html>
