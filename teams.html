<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - Village Premier League</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">VPL</a>
        <button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')" aria-label="Toggle menu">☰</button>
        <nav>
            <a href="index.html">Home</a>
            <a href="teams.html" class="active">Teams</a>
            <a href="fixtures.html">Fixtures</a>
            <a href="points.html">Points Table</a>
            <a href="stats.html">Stats</a>
            <a href="admin/index.html" class="admin-link">Admin login</a>
        </nav>
    </header>

    <main>
        <h1>Franchises</h1>
        <p class="subtitle">Meet the teams competing for the VPL title.</p>
        
        <div class="grid grid-cols-2" id="teams-grid">
            <!-- Rendered via JS -->
        </div>
    </main>


    <script src="js/store.js"></script>
    <script>

        const teams = Store.getTeams();
        const grid = document.getElementById('teams-grid');
        const activeYear = Store.getActiveYear();


        if (teams.length > 0) {
            grid.innerHTML = teams.map(t => {
                const squads = t.squads || {};
                const activeSquad = squads[activeYear] || t.players || [];
                const primary = t.primaryColor || '#D4AF37';
                const secondary = t.secondaryColor || '#1A1A1A';
                
                return `
                <a href="team.html?id=${t.id}" class="card" style="display:flex; flex-direction:column; align-items:center; text-align:center; border-top: 5px solid ${primary}; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, ${secondary}22 100%); position: relative; overflow: hidden; text-decoration: none; color: inherit; cursor: pointer;">
                    <div style="position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; background: ${primary}11; border-radius: 50%;"></div>
                    
                    ${t.logo ? 
                        `<div style="width: 90px; height: 90px; border-radius: 50%; overflow: hidden; border: 3px solid ${primary}; margin-bottom: 1.2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.4); background: ${secondary};"><img src="${t.logo}" style="width: 100%; height: 100%; object-fit: cover;"></div>` :
                        `<div style="width: 90px; height: 90px; border-radius: 50%; background: ${primary}; display:flex; align-items:center; justify-content:center; font-size: 2.2rem; font-weight: 800; color: ${secondary}; margin-bottom: 1.2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);">${t.shortName}</div>`
                    }
                    <h2 style="margin-bottom: 1.5rem;">${t.name}</h2>
                    <span class="btn" style="width:100%; background: ${primary}; color: ${secondary}; font-weight: 800; border: none; text-align:center;">View Team Profile →</span>
                </a>
                `;
            }).join('');
        } else {
            grid.innerHTML = '<p>No teams available.</p>';
        }
    </script>
</body>
</html>
