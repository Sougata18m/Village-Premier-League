<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile - Village Premier League</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Team Hero Banner */
        .team-hero {
            position: relative;
            padding: 3rem 2rem;
            border-radius: 20px;
            margin-bottom: 2.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .team-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            opacity: 0.08;
            z-index: 0;
        }
        .team-hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            opacity: 0.05;
            z-index: 0;
        }
        .team-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .team-logo-large {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .team-logo-placeholder {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .team-info {
            flex: 1;
            min-width: 250px;
        }
        .team-info h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: white;
            line-height: 1.1;
        }
        .team-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .meta-item .meta-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .meta-item .meta-value {
            font-weight: 800;
            font-size: 1rem;
        }

        /* Section Title */
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .section-header h2 {
            margin: 0;
            font-size: 1.6rem;
        }
        .section-header .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
        }

        /* Player Cards */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .player-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .player-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .player-card .captain-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--accent-gold);
            color: var(--primary-blue);
            font-weight: 900;
            font-size: 0.7rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(251, 191, 36, 0.3);
        }
        .player-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .player-avatar-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            background: var(--glass-border);
        }
        .player-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            display: block;
        }
        .player-role {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .player-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        .stat-box {
            background: rgba(0,0,0,0.25);
            padding: 0.5rem 0.3rem;
            border-radius: 6px;
            text-align: center;
        }
        .stat-box .stat-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 2px;
        }
        .stat-box .stat-val {
            font-weight: 800;
            font-size: 1rem;
            display: block;
        }
        .stat-box .stat-val.gold { color: var(--accent-gold); }
        .stat-box .stat-val.purple { color: #a855f7; }
        .stat-box .stat-val.white { color: white; }

        /* Back button */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--accent-gold);
        }

        /* Trophy Badge */
        .trophy-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05));
            border: 1px solid rgba(251,191,36,0.3);
            padding: 0.5rem 1rem;
            border-radius: 10px;
        }
        .trophy-badge .trophy-icon {
            font-size: 1.2rem;
        }

        /* Empty state */
        .empty-squad {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-squad .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .team-hero-content {
                flex-direction: column;
                text-align: center;
            }
            .team-info h1 {
                font-size: 2rem;
            }
            .team-meta {
                justify-content: center;
            }
            .players-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M14.5 2h-5c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h5c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 11h-5V4h5v9zm-7.5-2H5c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h2V3H5c-1.65 0-3 1.35-3 3v4c0 1.65 1.35 3 3 3h2v-2zm12-4V6c0-1.65-1.35-3-3-3h-2v2h2c.55 0 1 .45 1 1v4c0 .55-.45 1-1 1h-2v2h2c1.65 0 3-1.35 3-3z"/></svg>
            VPL
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="teams.html" class="active">Teams</a>
            <a href="fixtures.html">Fixtures</a>
            <a href="points.html">Points Table</a>
            <a href="stats.html">Stats</a>
            <a href="admin/index.html" class="admin-link">Admin login</a>
        </nav>
    </header>

    <main>
        <a href="teams.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Back to Teams
        </a>

        <!-- Team Hero Section -->
        <div class="team-hero" id="team-hero">
            <p style="color: var(--text-muted);">Loading team...</p>
        </div>

        <!-- Squad Section -->
        <div class="section-header">
            <h2 id="squad-section-title">Squad Roster</h2>
            <div class="line"></div>
        </div>

        <div class="players-grid" id="players-grid">
            <!-- Rendered via JS -->
        </div>
    </main>

    <script src="js/store.js"></script>
    <script>
        // Get team ID from URL
        const params = new URLSearchParams(window.location.search);
        const teamId = params.get('id');
        const activeYear = Store.getActiveYear();

        if (!teamId) {
            window.location.href = 'teams.html';
        }

        const teams = Store.getTeams();
        const team = teams.find(t => t.id === teamId);

        if (!team) {
            document.getElementById('team-hero').innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <h2 style="color: var(--danger);">Team not found</h2>
                    <p style="color: var(--text-muted);">This team may have been deleted.</p>
                    <a href="teams.html" class="btn btn-outline" style="margin-top: 1rem;">View All Teams</a>
                </div>
            `;
            document.getElementById('players-grid').innerHTML = '';
            document.querySelector('.section-header').style.display = 'none';
        } else {
            const primary = team.primaryColor || '#D4AF37';
            const secondary = team.secondaryColor || '#1A1A1A';
            const squads = team.squads || {};
            const players = squads[activeYear] || team.players || [];

            // Find captain
            const captain = players.find(p => p.isCaptain);
            const captainName = captain ? captain.name : 'Not Assigned';

            // Trophy years
            const trophyYears = team.trophyYears || [];

            // Update page title
            document.title = `${team.name} - Village Premier League`;

            // Render Hero
            const hero = document.getElementById('team-hero');
            hero.style.background = `linear-gradient(135deg, ${secondary} 0%, ${primary}15 50%, ${secondary} 100%)`;
            hero.style.borderTop = `4px solid ${primary}`;

            // Add glow circles
            hero.innerHTML = `
                <div style="position:absolute; top:-50%; right:-10%; width:350px; height:350px; border-radius:50%; background:${primary}; opacity:0.06; z-index:0;"></div>
                <div style="position:absolute; bottom:-40%; left:-5%; width:250px; height:250px; border-radius:50%; background:${primary}; opacity:0.04; z-index:0;"></div>
                <div class="team-hero-content">
                    ${team.logo 
                        ? `<img src="${team.logo}" class="team-logo-large" style="border: 4px solid ${primary};" alt="${team.name} Logo">` 
                        : `<div class="team-logo-placeholder" style="background: ${primary}; color: ${secondary}; border: 4px solid ${primary}44;">${team.shortName}</div>`
                    }
                    <div class="team-info">
                        <h1 style="color: white;">${team.name}</h1>
                        <p style="color: ${primary}; font-weight: 600; font-size: 1.1rem; margin: 0; letter-spacing: 2px; text-transform: uppercase;">${team.shortName}</p>
                        
                        <div class="team-meta">
                            <div class="meta-item">
                                <div>
                                    <span class="meta-label">Captain</span>
                                    <span class="meta-value" style="color: var(--accent-gold);">${captainName}</span>
                                </div>
                            </div>
                            ${trophyYears.length > 0 ? `
                            <div class="trophy-badge">
                                <span class="trophy-icon">🏆</span>
                                <div>
                                    <span class="meta-label" style="color: var(--accent-gold);">Champions</span>
                                    <span class="meta-value" style="color: var(--accent-gold);">${trophyYears.join(', ')}</span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            // Render Squad Section Title
            document.getElementById('squad-section-title').innerText = `Squad Roster — ${activeYear}`;

            // Render Players
            const grid = document.getElementById('players-grid');
            if (players.length === 0) {
                grid.innerHTML = `
                    <div class="empty-squad" style="grid-column: 1 / -1;">
                        <div class="icon">👥</div>
                        <h3>No Players Registered</h3>
                        <p>No squad data found for the ${activeYear} season.</p>
                    </div>
                `;
            } else {
                grid.innerHTML = players.map(p => {
                    const obj = typeof p === 'string' 
                        ? { name: p, runs:0, wickets:0, strikeRate:0, economy:0, fifties:0, hundreds:0, highestScore:'0', bestBowling:'0/0', totalSixes:0, totalFours:0, image:null, isCaptain: false } 
                        : p;

                    return `
                    <div class="player-card" style="border-top: 3px solid ${primary};">
                        ${obj.isCaptain ? '<div class="captain-badge">👑 Captain</div>' : ''}
                        <div class="player-header">
                            ${obj.image 
                                ? `<img src="${obj.image}" class="player-avatar" style="border: 2px solid ${primary};" alt="${obj.name}">` 
                                : `<div class="player-avatar-placeholder" style="border: 2px solid ${primary};">👤</div>`
                            }
                            <div>
                                <span class="player-name">${obj.name}</span>
                                <span class="player-role">${obj.isCaptain ? 'Captain' : 'Player'}</span>
                            </div>
                        </div>
                        <div class="player-stats-grid">
                            <div class="stat-box">
                                <span class="stat-label">Runs</span>
                                <span class="stat-val gold">${obj.runs || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Wkts</span>
                                <span class="stat-val purple">${obj.wickets || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">S/R</span>
                                <span class="stat-val white">${obj.strikeRate || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Econ</span>
                                <span class="stat-val white">${obj.economy || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">HS</span>
                                <span class="stat-val gold">${obj.highestScore || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">BBI</span>
                                <span class="stat-val purple">${obj.bestBowling || '0/0'}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">50s</span>
                                <span class="stat-val white">${obj.fifties || 0}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">100s</span>
                                <span class="stat-val white">${obj.hundreds || 0}</span>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }
        }
    </script>
</body>
</html>
